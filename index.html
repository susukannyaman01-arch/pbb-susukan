const COLORS = {
  'MULANI':'#2563eb','KARMAN':'#7c3aed','IIB':'#059669','ILHAM':'#d97706',
  'ANDI':'#dc2626','SAEP':'#0891b2','KUSNADI':'#6d28d9','KAMINAH':'#be185d',
  'DH':'#65a30d','BAHA':'#ea580c','TANGGUH':'#4f46e5','MAMURI':'#0f766e',
  'IMAM':'#b45309','MUNAJI':'#1d4ed8','ARDI':'#9d174d','YOGI':'#047857',
  'DESA':'#374151','INO':'#7e22ce'
};

function getColor(k) { return COLORS[k] || '#6b7280'; }

let currentResults = [];
let shownCount = 0;
const PAGE_SIZE = 20;

function formatRupiah(n) {
  return 'Rp ' + n.toLocaleString('id-ID');
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toUpperCase();
  if (q.length < 2) { alert('Masukkan minimal 2 karakter'); return; }
  currentResults = DATA.filter(d =>
    d.NOP.toUpperCase().includes(q) ||
    d.NAMA.toUpperCase().includes(q) ||
    d.KOLEKTOR.toUpperCase().includes(q)
  );
  shownCount = 0;
  document.getElementById('results').style.display = 'block';
  document.getElementById('resultCount').textContent = currentResults.length + ' data';
  renderResults(true);
}

function renderResults(reset) {
  const list = document.getElementById('resultList');
  if (reset) list.innerHTML = '';

  if (currentResults.length === 0) {
    list.innerHTML = '<div class="no-result"><div class="icon">🔍</div><p>Data tidak ditemukan.<br>Coba kata kunci lain.</p></div>';
    document.getElementById('moreBtn').style.display = 'none';
    return;
  }

  const slice = currentResults.slice(shownCount, shownCount + PAGE_SIZE);
  slice.forEach((d, i) => {
    const idx = shownCount + i;
    const color = getColor(d.KOLEKTOR);
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `
      <div class="item-main" onclick="toggleDetail(${idx})">
        <div class="item-left">
          <div class="item-nama">${d.NAMA}</div>
          <div class="item-nop">${d.NOP}</div>
        </div>
        <div class="item-right">
          <div class="item-target">${formatRupiah(d.TARGET)}</div>
          <div class="item-target-lbl">TARGET PBB</div>
        </div>
      </div>
      <div class="item-meta" onclick="toggleDetail(${idx})">
        <div>
          <span class="badge-label">Kolektor:</span>
          <span class="badge" style="background:${color}">${d.KOLEKTOR}</span>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="item-detail" id="detail-${idx}">
        <div class="detail-row">
          <span class="detail-lbl">NOP</span>
          <span class="detail-val" style="font-family:monospace;font-size:11px">${d.NOP}</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">Nama WP</span>
          <span class="detail-val">${d.NAMA}</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">Target PBB</span>
          <span class="detail-val" style="color:#0d5c2e">${formatRupiah(d.TARGET)}</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">Kolektor</span>
          <span class="detail-val"><span class="badge" style="background:${color}">${d.KOLEKTOR}</span></span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">Desa</span>
          <span class="detail-val">${d.DESA}</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">Tahun</span>
          <span class="detail-val">${d.TAHUN}</span>
        </div>
      </div>
    `;
    list.appendChild(div);
  });

  shownCount += slice.length;
  document.getElementById('moreBtn').style.display = shownCount < currentResults.length ? 'block' : 'none';
}

function toggleDetail(idx) {
  const el = document.getElementById('detail-' + idx);
  if (!el) return;
  el.classList.toggle('show');
  el.closest('.result-item').classList.toggle('expanded');
}

function showMore() { renderResults(false); }

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
